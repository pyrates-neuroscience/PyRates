# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1

# Reusable command: install the system-level Fortran compiler used by the
# Fortran backend's f2py path. `meson` + `ninja` come in via the `[tests]`
# pip extras (they ship as wheels), but the toolchain itself has to be
# apt-installed on the bare cimg/python image.
commands:
  install_fortran_toolchain:
    steps:
      - run:
          name: Install gfortran
          command: sudo apt-get update && sudo apt-get install -y gfortran

# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/2.0/configuration-reference/#jobs
jobs:
  p38:
    docker:
      - image: cimg/python:3.8.12
    steps:
      - checkout
      - install_fortran_toolchain
      - run: pip install --upgrade pip
      - run: pip install .[tests]
      - run: pytest tests/
  p39:
    docker:
      - image: cimg/python:3.9.10
    steps:
      - checkout
      - install_fortran_toolchain
      - run: pip install --upgrade pip
      - run: pip install .[tests]
      - run: pytest tests/
  p310:
    docker:
      - image: cimg/python:3.10.18
    steps:
      - checkout
      - install_fortran_toolchain
      - run: pip install --upgrade pip
      - run: pip install .[tests]
      - run: pytest tests/
  p311:
    docker:
      - image: cimg/python:3.11.13
    steps:
      - checkout
      - install_fortran_toolchain
      - run: pip install --upgrade pip
      - run: pip install .[tests]
      - run: pytest tests/
  p312:
    docker:
      - image: cimg/python:3.12.11
    steps:
      - checkout
      - install_fortran_toolchain
      - run: pip install --upgrade pip
      - run: pip install .[tests]
      - run: pytest tests/
# Invoke jobs via workflows
# See: https://circleci.com/docs/2.0/configuration-reference/#workflows
workflows:
  pyrates: # This is the name of the workflow, feel free to change it to better match your workflow.
    # Inside the workflow, you define the jobs you want to run.
    jobs:
      - p38
      - p39
      - p310
      - p311
      - p312
